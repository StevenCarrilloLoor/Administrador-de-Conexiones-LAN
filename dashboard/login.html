<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso · Administrador de Conexiones LAN</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%B0%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <style>
    :root{--bg:#0e1420;--panel:#182234;--border:#26344b;--text:#e6edf7;--muted:#93a3bd;--accent:#3d8bff;--red:#ff5964;--green:#37d67a}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#0c111b,#0e1420);color:var(--text);
      font-family:"Segoe UI",system-ui,Roboto,Arial,sans-serif;padding:20px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;
      padding:30px;width:min(400px,100%);box-shadow:0 10px 40px rgba(0,0,0,.4)}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
    .brand .logo{font-size:30px}
    h1{font-size:1.15rem;margin:0}
    .sub{color:var(--muted);font-size:.82rem;margin:2px 0 20px}
    label{display:block;font-size:.82rem;color:var(--muted);margin:14px 0 5px}
    input{width:100%;padding:11px 12px;border-radius:10px;border:1px solid var(--border);
      background:#0e1726;color:var(--text);font-size:.95rem}
    input:focus{outline:none;border-color:var(--accent)}
    button{width:100%;margin-top:22px;padding:12px;border:none;border-radius:10px;
      background:var(--accent);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer}
    button:hover{background:#2b6fe0} button:disabled{opacity:.6;cursor:progress}
    .msg{margin-top:14px;font-size:.85rem;min-height:1.2em}
    .msg.err{color:var(--red)} .msg.ok{color:var(--green)}
    .hint{color:var(--muted);font-size:.78rem;margin-top:16px;line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="logo">🛰️</span><div>
      <h1>Administrador de Conexiones LAN</h1>
      <div class="sub" id="mode-sub">Iniciá sesión para continuar</div>
    </div></div>

    <form id="form" autocomplete="off">
      <label for="username">Usuario</label>
      <input id="username" name="username" type="text" required minlength="3" autocomplete="username" />
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required minlength="6" autocomplete="current-password" />
      <div id="confirm-wrap" style="display:none">
        <label for="confirm">Repetir contraseña</label>
        <input id="confirm" type="password" minlength="6" autocomplete="new-password" />
      </div>
      <button id="submit" type="submit">Entrar</button>
      <div class="msg" id="msg"></div>
    </form>
    <div class="hint" id="hint"></div>
  </div>

  <script>
    let setupMode = false;
    const $ = (id) => document.getElementById(id);

    async function init() {
      try {
        const r = await fetch("/api/auth/status");
        const s = await r.json();
        if (s.authenticated) { location.href = "/"; return; }
        setupMode = !s.configured;
      } catch (_) {}
      if (setupMode) {
        $("mode-sub").textContent = "Primer uso: creá la cuenta de administrador";
        $("confirm-wrap").style.display = "block";
        $("submit").textContent = "Crear cuenta";
        $("password").setAttribute("autocomplete", "new-password");
        $("hint").textContent = "Esta cuenta protege el panel. La contraseña se guarda con hash (bcrypt); no se puede recuperar, así que anotala.";
      } else {
        $("hint").textContent = "El acceso al panel requiere sesión porque queda expuesto en la red.";
      }
    }

    $("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = $("msg"); msg.className = "msg"; msg.textContent = "";
      const username = $("username").value.trim();
      const password = $("password").value;
      if (setupMode && password !== $("confirm").value) {
        msg.className = "msg err"; msg.textContent = "Las contraseñas no coinciden."; return;
      }
      $("submit").disabled = true;
      try {
        const r = await fetch(setupMode ? "/api/auth/setup" : "/api/auth/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        if (r.ok) {
          msg.className = "msg ok"; msg.textContent = "Listo, entrando…";
          location.href = "/";
        } else {
          const d = await r.json().catch(() => ({}));
          msg.className = "msg err"; msg.textContent = d.detail || "No se pudo autenticar.";
          $("submit").disabled = false;
        }
      } catch (err) {
        msg.className = "msg err"; msg.textContent = "Error de red: " + err.message;
        $("submit").disabled = false;
      }
    });

    init();
  </script>
</body>
</html>
