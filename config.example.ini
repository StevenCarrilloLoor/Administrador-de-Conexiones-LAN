; Configuracion del Administrador de Conexiones LAN
; Copia este archivo a "config.ini" y ajusta lo que necesites.
; Las variables de entorno LANMGR_* tienen prioridad sobre este archivo.

[server]
; 127.0.0.1 = solo esta PC (recomendado en Fase 1, sin autenticacion).
; 0.0.0.0   = accesible desde toda la LAN (celular/laptop). REQUIERE la
;             autenticacion de la Fase 3 antes de usarse de forma segura.
host = 127.0.0.1
port = 8080

; Rutas (por defecto quedan dentro del proyecto)
; db_path  = data/lanmanager.db
; log_dir  = logs

[scan]
; Segundos entre escaneos automaticos
interval = 30
; Un dispositivo se considera "en linea" si se vio hace <= online_ttl segundos
online_ttl = 90
; Timeout del escaneo ARP por subred (segundos)
timeout = 3.0
; Arrancar el escaneo automatico al iniciar (si hay Npcap)
auto_scan = true
; Retencion del historial: se purgan eventos (y alertas ya vistas) mas viejos
; que esta cantidad de dias. Purga diaria + VACUUM.
retention_days = 30
