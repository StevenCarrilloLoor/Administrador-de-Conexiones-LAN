<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b86"/>
    </marker>
    <style>
      .box{rx:12;ry:12;stroke-width:1.5}
      .t{fill:#1b2536;font-size:14px}
      .th{fill:#0e1726;font-size:15px;font-weight:700}
      .ts{fill:#5b6b86;font-size:11.5px}
      .lbl{fill:#5b6b86;font-size:11.5px}
      .edge{stroke:#5b6b86;stroke-width:1.6;fill:none}
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="560" fill="#f5f7fb"/>
  <text x="30" y="38" class="th" font-size="19">Administrador de Conexiones LAN — Arquitectura (Fase 1)</text>
  <text x="30" y="58" class="ts">Agente + dashboard web en un solo proceso · SQLite local · escaneo ARP</text>

  <!-- Clients -->
  <rect class="box" x="330" y="86" width="260" height="58" fill="#e8effb" stroke="#a9c2e8"/>
  <text x="460" y="112" text-anchor="middle" class="th">Navegador</text>
  <text x="460" y="131" text-anchor="middle" class="ts">PC local o celular / laptop en la LAN</text>

  <!-- HTTP+WS edge -->
  <path class="edge" d="M460,144 L460,182" marker-end="url(#arrow)"/>
  <text x="470" y="168" class="lbl">HTTP REST + WebSocket</text>

  <!-- Agent process outer -->
  <rect class="box" x="60" y="188" width="800" height="300" fill="#ffffff" stroke="#c4cede"/>
  <text x="80" y="212" class="th">Proceso agente (Python 3.11, con privilegios de administrador)</text>

  <!-- FastAPI -->
  <rect class="box" x="90" y="228" width="300" height="70" fill="#e9f7ef" stroke="#9edcb8"/>
  <text x="240" y="255" text-anchor="middle" class="th">FastAPI + Uvicorn</text>
  <text x="240" y="275" text-anchor="middle" class="ts">API REST · WebSocket /ws/live</text>
  <text x="240" y="289" text-anchor="middle" class="ts">sirve el dashboard estático</text>

  <!-- Dashboard -->
  <rect class="box" x="90" y="330" width="300" height="64" fill="#eef1f7" stroke="#c4cede"/>
  <text x="240" y="356" text-anchor="middle" class="th">Dashboard (HTML/JS/CSS)</text>
  <text x="240" y="376" text-anchor="middle" class="ts">responsive · buscador · tiempo real</text>

  <!-- Scanner service -->
  <rect class="box" x="530" y="228" width="300" height="70" fill="#fff5e6" stroke="#f0cf95"/>
  <text x="680" y="255" text-anchor="middle" class="th">ScannerService (APScheduler)</text>
  <text x="680" y="275" text-anchor="middle" class="ts">escaneo periódico · diff de altas/bajas</text>
  <text x="680" y="289" text-anchor="middle" class="ts">eventos + alertas + broadcast</text>

  <!-- Discovery -->
  <rect class="box" x="530" y="330" width="300" height="64" fill="#fdeef0" stroke="#efb9c0"/>
  <text x="680" y="356" text-anchor="middle" class="th">Descubrimiento (scapy / ARP)</text>
  <text x="680" y="376" text-anchor="middle" class="ts">hostname · OUI IEEE · tipo inferido</text>

  <!-- Repositories -->
  <rect class="box" x="310" y="418" width="300" height="52" fill="#eef1f7" stroke="#c4cede"/>
  <text x="460" y="440" text-anchor="middle" class="th">Repositorios (capa de datos)</text>
  <text x="460" y="457" text-anchor="middle" class="ts">devices · events · rules · alerts · settings</text>

  <!-- Npcap (driver) outside -->
  <rect class="box" x="530" y="500" width="300" height="44" fill="#f0eafb" stroke="#c9b8ec"/>
  <text x="680" y="521" text-anchor="middle" class="th">Npcap (driver de captura)</text>
  <text x="680" y="537" text-anchor="middle" class="ts">requerido en Windows para ARP</text>

  <!-- SQLite outside -->
  <rect class="box" x="90" y="500" width="300" height="44" fill="#e8effb" stroke="#a9c2e8"/>
  <text x="240" y="521" text-anchor="middle" class="th">SQLite (data/lanmanager.db)</text>
  <text x="240" y="537" text-anchor="middle" class="ts">inventario · historial · reglas · alertas</text>

  <!-- Edges inside -->
  <path class="edge" d="M240,298 L240,330" marker-end="url(#arrow)"/>
  <path class="edge" d="M390,263 L530,263" marker-end="url(#arrow)"/>
  <text x="415" y="256" class="lbl">arranca</text>
  <path class="edge" d="M680,298 L680,330" marker-end="url(#arrow)"/>
  <path class="edge" d="M600,362 Q470,362 460,418" marker-end="url(#arrow)"/>
  <path class="edge" d="M300,263 Q460,263 460,418" marker-end="url(#arrow)" opacity="0.55"/>
  <path class="edge" d="M460,470 L240,500" marker-end="url(#arrow)"/>
  <path class="edge" d="M680,394 L680,500" marker-end="url(#arrow)"/>
  <text x="690" y="450" class="lbl">captura L2</text>
</svg>
